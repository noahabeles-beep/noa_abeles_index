<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1512">
  <title>האינציקלופדיה של הרעיוננות</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'SimplerPro-Regular';
      src: url('SimplerPro-Regular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'SimplerPro-BoldItalic';
      src: url('SimplerPro-BoldItalic.otf') format('opentype');
      font-weight: 900;
      font-style: italic;
    }

    @font-face {
      font-family: 'SimplerPro-BoldItalic-Nav';
      src: url('SimplerPro-BoldItalic.otf') format('opentype');
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      margin: 0;
      padding: 0;
      background: #1a1617;
      font-family: 'Heebo', sans-serif;
    }

    /* Outer shell — fixed 1512×982, scaled to fit viewport */
    #shell {
      width: 1512px;
      height: 982px;
      background: #2a2425;
      position: absolute;
      top: 0;
      left: 0;
      display: flex;
      flex-direction: column;
      transform-origin: top left;
    }

    /* Dashed outline on the very outer edge */
    #shell::before {
      content: '';
      position: absolute;
      inset: 2px;
      border: 1.5px dashed rgba(255,255,255,0.45);
      pointer-events: none;
      z-index: 100;
    }

    /* ─── NAV BAR ─── */
    #nav {
      width: 100%;
      height: 76px;
      background: #2a2425;
      display: flex;
      align-items: stretch;
      flex-shrink: 0;
      direction: rtl;
      border-bottom: 1.5px dashed rgba(255,255,255,0.45);
    }

    .nav-item {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 24px;
      color: #e5e7e5;
      font-family: 'Heebo', sans-serif;
      font-size: 18px;
      font-weight: 400;
      cursor: pointer;
      white-space: nowrap;
      border-left: 1.5px dashed rgba(255,255,255,0.45);
      position: relative;
    }

    .nav-item:hover {
      font-family: 'SimplerPro-BoldItalic-Nav', sans-serif;
    }

    /* Logo item — rightmost */
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px 0 24px;
      border-left: 1.5px dashed rgba(255,255,255,0.45);
      border-right: none;
      flex-shrink: 0;
    }

    /* Spacer that grows to fill remaining space */
    .nav-spacer {
      flex: 1;
      border-left: 1.5px dashed rgba(255,255,255,0.45);
    }

    /* Nav text items */
    .nav-label {
      font-size: 18px;
      font-weight: 400;
      color: #e5e7e5;
      min-width: 140px;
    }

    .nav-search {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 160px;
      border-left: none;
      direction: ltr;
    }

    .nav-search svg {
      width: 18px;
      height: 18px;
      opacity: 0.85;
      flex-shrink: 0;
    }

    /* ─── CONTENT WRAPPER ─── */
    #content-wrapper {
      flex: 1;
      padding: 8px 28px 20px 28px;
      display: flex;
      flex-direction: column;
    }

    /* Blue-bordered content frame */
    #content-frame {
      flex: 1;
      border: none;
      position: relative;
      overflow: hidden;
      background: #D9D9D9;
    }

    /* The p5 canvas area fills the content frame */
    .tool-canvas-area {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background: #D9D9D9;
    }

    canvas { display: block; background: transparent; }
  </style>
</head>

      class Node {
        constructor(id, data) {
          this.id = id;
          this.label = data.label;
          this.related = data.related;
          this.init();
        }
        init() {
          this.x = random(width * 0.05, width * 0.95);
          this.y = random(height * 0.05, height * 0.95);
          const angle = random(TWO_PI);
          this.dirX = cos(angle);
          this.dirY = sin(angle);
          this.currentScale = 1;
          this.targetScale = 1;
          this.currentStyle = 1;
          this.targetStyle = 1;
        }
        isRelevant(hovered) {
          if (!hovered) return false;
          if (this === hovered) return true;
          // Same topic (duplicate copy)
          if (this.label === hovered.label) return true;
          // Bidirectional: A→B or B→A
          return hovered.related.includes(this.label) || this.related.includes(hovered.label);
        }
        update(hovered) {
          const speed = controls.get('speed') * 0.5;
          const isPlaying = controls.get('playing');
          const relevant = this.isRelevant(hovered);
          if (isPlaying && !relevant) {
            this.x += this.dirX * speed;
            this.y += this.dirY * speed;
            const margin = 20;
            if (this.x < margin || this.x > width - margin) {
              this.dirX *= -1;
              this.x = constrain(this.x, margin, width - margin);
            }
            if (this.y < margin || this.y > height - margin) {
              this.dirY *= -1;
              this.y = constrain(this.y, margin, height - margin);
            }
          }
          this.currentScale = lerp(this.currentScale, this.targetScale, 0.2);
          this.currentStyle = lerp(this.currentStyle, this.targetStyle, 0.2);
        }
        getRadius() {
          const baseTextSize = controls.get('textSize');
          const size = baseTextSize * this.currentScale;
          textFont('SimplerPro-Regular');
          textStyle(NORMAL);
          textSize(size);
          const tw = textWidth(this.label);
          return (tw + size) / 4;
        }
        draw(layer, hovered) {
          const baseTextSize = controls.get('textSize');
          const size = baseTextSize * this.currentScale;
          const relevant = this.isRelevant(hovered);
          if (this.label) {
            let col = relevant ? controls.get('hoverColor') : controls.get('textColor');
            if (relevant) {
              textFont('SimplerPro-BoldItalic');
              textStyle(ITALIC);
            } else {
              textFont('SimplerPro-Regular');
              textStyle(NORMAL);
            }
            textSize(size);
            textAlign(CENTER, CENTER);
            const tw = textWidth(this.label);
            const th = size;
            const padding = 4;
            if (layer === 'background') {
              if (relevant) {
                noStroke();
                fill(controls.get('textBgColor'));
                rectMode(CENTER);
                rect(this.x, this.y, tw + padding * 2, th + padding, 4);
              }
            } else if (layer === 'text') {
              let c = color(col);
              c.setAlpha(this.currentStyle * 255);
              fill(c);
              text(this.label, this.x, this.y);
            }
          }
        }
      }

      function resolveCollisions() {
        const padding = controls.get('collisionPadding');
        for (let i = 0; i < nodes.length; i++) {
          for (let j = i + 1; j < nodes.length; j++) {
            let n1 = nodes[i], n2 = nodes[j];
            let dx = n2.x - n1.x, dy = n2.y - n1.y;
            let distance = sqrt(dx*dx + dy*dy);
            let r1 = n1.getRadius(), r2 = n2.getRadius();
            let minDist = r1 + r2 + padding;
            if (distance < minDist && distance > 0) {
              let overlap = minDist - distance;
              let nx = dx/distance, ny = dy/distance;
              let m1 = n1.targetScale > 1 ? 2 : 1;
              let m2 = n2.targetScale > 1 ? 2 : 1;
              let totalM = m1 + m2;
              n1.x -= nx * overlap * (m2/totalM);
              n1.y -= ny * overlap * (m2/totalM);
              n2.x += nx * overlap * (m1/totalM);
              n2.y += ny * overlap * (m1/totalM);
              if (controls.get('playing')) {
                n1.dirX -= nx * 0.05; n1.dirY -= ny * 0.05;
                n2.dirX += nx * 0.05; n2.dirY += ny * 0.05;
                let d1 = sqrt(n1.dirX*n1.dirX + n1.dirY*n1.dirY);
                let d2 = sqrt(n2.dirX*n2.dirX + n2.dirY*n2.dirY);
                if (d1 > 0) { n1.dirX /= d1; n1.dirY /= d1; }
                if (d2 > 0) { n2.dirX /= d2; n2.dirY /= d2; }
              }
            }
          }
        }
      }

      // Returns mouse position corrected for CSS transform scale on #shell
      function getMouseInCanvas() {
        var canvas = document.querySelector('.tool-canvas-area canvas');
        if (!canvas) return { x: mouseX, y: mouseY };
        var rect = canvas.getBoundingClientRect();
        if (rect.width === 0 || rect.height === 0) return { x: mouseX, y: mouseY };
        return {
          x: (window._rawMouse.x - rect.left) * (width  / rect.width),
          y: (window._rawMouse.y - rect.top)  * (height / rect.height)
        };
      }

      function draw() {
        background(controls.get('bgColor'));
        drawGrid();
        const textSizeVal = controls.get('textSize');
        const lineColor = controls.getColorWithAlpha('lineColor');
        const lineWeight = controls.get('lineWeight');
        const dotSize = controls.get('dotSize');

        const cm = getMouseInCanvas();

        let prevHovered = hoveredNode;
        hoveredNode = null;
        for (let n of nodes) {
          let d = dist(cm.x, cm.y, n.x, n.y);
          if (d < textSizeVal * 1.5) { hoveredNode = n; break; }
        }
        if (hoveredNode && hoveredNode !== prevHovered) connectionStartTime = millis();

        for (let n of nodes) {
          if (!hoveredNode) {
            n.targetStyle = 1; n.targetScale = 1;
          } else {
            if (n === hoveredNode) { n.targetStyle = 1; n.targetScale = 1.4; }
            else if (n.isRelevant(hoveredNode)) { n.targetStyle = 1; n.targetScale = 1.1; }
            else { n.targetStyle = 0.3; n.targetScale = 0.9; }
          }
          n.update(hoveredNode);
        }
        resolveCollisions();

        if (hoveredNode) {
          let relevantNodes = nodes.filter(n => n !== hoveredNode && n.isRelevant(hoveredNode));
          relevantNodes.forEach((n, index) => {
            const staggerDelay = index * 30;
            const elapsed = millis() - connectionStartTime - staggerDelay;
            if (elapsed > 0) {
              const throwDuration = 150;
              let progress = constrain(elapsed / throwDuration, 0, 1);
              const easedProgress = 1 - Math.pow(1 - progress, 3);
              const dx = n.x - hoveredNode.x, dy = n.y - hoveredNode.y;
              const angle = atan2(dy, dx);
              const getEllipseRadius = (w, h, a) => {
                const a_val = w/2, b_val = h/2;
                return (a_val * b_val) / sqrt(pow(b_val*cos(a),2) + pow(a_val*sin(a),2));
              };
              textFont('SimplerPro-BoldItalic');
              textStyle(ITALIC);
              const circlePadding = controls.get('circlePadding');
              textSize(textSizeVal * hoveredNode.currentScale);
              const twH = textWidth(hoveredNode.label) + circlePadding * 2;
              const thH = (textSizeVal * hoveredNode.currentScale) + circlePadding * 2;
              const dynamicGapStart = getEllipseRadius(twH, thH, angle);
              textSize(textSizeVal * n.currentScale);
              const twT = textWidth(n.label) + circlePadding * 2;
              const thT = (textSizeVal * n.currentScale) + circlePadding * 2;
              const dynamicGapEnd = getEllipseRadius(twT, thT, angle + PI);
              const startX = hoveredNode.x + cos(angle) * dynamicGapStart;
              const startY = hoveredNode.y + sin(angle) * dynamicGapStart;
              const targetX = n.x + cos(angle + PI) * dynamicGapEnd;
              const targetY = n.y + sin(angle + PI) * dynamicGapEnd;
              const currentEndX = lerp(startX, targetX, easedProgress);
              const currentEndY = lerp(startY, targetY, easedProgress);
              stroke(lineColor);
              strokeWeight(lineWeight);
              noFill();
              if (dotSize > 0) {
                fill(lineColor); noStroke();
                ellipse(startX, startY, dotSize);
                if (progress > 0.1) ellipse(currentEndX, currentEndY, dotSize);
              }
              stroke(lineColor);
              strokeWeight(lineWeight);
              noFill();
              drawingContext.setLineDash([6, 4]);
              line(startX, startY, currentEndX, currentEndY);
              drawingContext.setLineDash([]);
            }
          });

          if (controls.get('showCircle')) {
            const fontData = controls.get('fontFamily');
            if (fontData && fontData.family) textFont(fontData.family);
            textSize(textSizeVal * hoveredNode.currentScale);
            const tw = textWidth(hoveredNode.label);
            const th = textSizeVal * hoveredNode.currentScale;
            const padding = controls.get('circlePadding');
            stroke(controls.get('hoverColor'));
            strokeWeight(controls.get('circleWeight'));
            strokeCap(ROUND);
            noFill();
            const dashSize = controls.get('circleDashSize');
            drawingContext.setLineDash([dashSize, dashSize * 1.5]);
            ellipse(hoveredNode.x, hoveredNode.y, tw + padding * 2, th + padding * 2);
            drawingContext.setLineDash([]);
          }
        }

        for (let n of nodes) n.draw('background', hoveredNode);
        for (let n of nodes) n.draw('text', hoveredNode);
        if (hoveredNode && controls.get('showPreviewBox')) {
          drawPreviewBox(hoveredNode);
        } else {
          _appleOverlay.style.display     = 'none';
          _artOverlay.style.display       = 'none';
          _fantasyOverlay.style.display   = 'none';
          _techOverlay.style.display      = 'none';
          _archOverlay.style.display      = 'none';
          _commOverlay.style.display      = 'none';
          _lifestyleOverlay.style.display = 'none';
          _urbanOverlay.style.display     = 'none';
          _litOverlay.style.display       = 'none';
          _theoryOverlay.style.display    = 'none';
          _psychoOverlay.style.display    = 'none';
          _scienceOverlay.style.display   = 'none';
          _langOverlay.style.display      = 'none';
        _tvOverlay.style.display        = 'none';
        _historyOverlay.style.display   = 'none';
        _genderOverlay.style.display    = 'none';
        _altOverlay.style.display       = 'none';
        _thoughtOverlay.style.display   = 'none';
        }
      }

      function windowResized() {
        const area = document.querySelector('.tool-canvas-area');
        resizeCanvas(area.clientWidth, area.clientHeight);
        for (let n of nodes) {
          n.x = constrain(n.x, 0, width);
          n.y = constrain(n.y, 0, height);
        }
      }
    }
  </script>
</body>
</html>
